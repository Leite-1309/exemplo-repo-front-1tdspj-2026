<!DOCTYPE html>
<!-- DTD é o Document Type Definition e informa para o navegador a versão do HTML que está sendo carregada. Assim o navegador pode carregar um cojunto de bibliotecas de acordo com a versão específica. -->

<!-- ATRIBUTOS:
Os atributos são do tipo chave = valor.
Ex: lang="pt-Br", isso é um atribut que pode ir em qualquer tag de conteúdo. <html lang="pt-BR"> ... </html> -->

<html lang="pt-br">
</html>
